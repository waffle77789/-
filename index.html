<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Simulator</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="home-screen" class="screen active">
        <div class="home-bg"></div>
        <div class="home-content">
            <h1 class="logo">
                <span class="logo-icon">&#9825;</span>
                CASE SIMULATOR
            </h1>
            <p class="subtitle">Открой кейс и получи свой лут!</p>

            <div class="balance-bar" id="balance-bar">
                <span class="balance-label">💰 Баланс:</span>
                <span class="balance-amount" id="balance-amount">0</span>
                <button class="topup-btn" id="topup-btn">+</button>
            </div>

            <div class="category-tabs" id="category-tabs">
                <button class="tab-btn active" data-tab="reallife">
                    <span class="tab-icon">🏠</span> Реальная жизнь
                </button>
                <button class="tab-btn" data-tab="cs2">
                    <span class="tab-icon">🎯</span> CS2
                </button>
            </div>

            <div class="cases-grid" id="cases-grid"></div>
            <div class="cases-grid cs2-hidden" id="cs2-grid"></div>
        </div>
    </div>

    <!-- ЭКРАН CS2 КАТЕГОРИЙ -->
    <div id="cs2-categories-screen" class="screen">
        <button class="back-btn" id="back-btn-cs2">&larr; Назад</button>
        <div class="case-header">
            <div class="case-icon-large" id="cs2-cat-icon"></div>
            <h2 class="case-title" id="cs2-cat-title"></h2>
        </div>
        <div class="cases-grid" id="cs2-cases-grid"></div>
    </div>

    <!-- ЭКРАН ОТКРЫТИЯ КЕЙСА -->
    <div id="case-screen" class="screen">
        <button class="back-btn" id="back-btn">&larr; Назад</button>

        <div class="case-header">
            <div class="case-icon-large" id="case-icon-large"></div>
            <h2 class="case-title" id="case-title"></h2>
        </div>

        <div class="roll-container">
            <div class="roll-pointer"></div>
            <div class="roll-track" id="roll-track"></div>
        </div>

        <button class="open-btn" id="open-btn">
            <span class="btn-text">ОТКРЫТЬ КЕЙС</span>
            <span class="btn-glow"></span>
        </button>

        <div class="case-items-preview" id="case-items-preview"></div>

        <div class="result-overlay" id="result-overlay">
            <div class="result-card" id="result-card">
                <div class="result-rarity" id="result-rarity"></div>
                <div class="result-icon" id="result-icon"></div>
                <div class="result-text" id="result-text"></div>
                <div class="result-chance" id="result-chance"></div>
                <div class="result-buttons">
                    <button class="result-close-btn" id="result-close-btn">Ещё раз!</button>
                    <a class="result-steam-btn" id="result-steam-btn" href="#" target="_blank">
                        💰 Цена в Стим
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- ИСТОРИЯ -->
    <div class="history-panel" id="history-panel">
        <div class="history-header">
            <span>История</span>
            <button class="history-toggle" id="history-toggle">&raquo;</button>
        </div>
        <div class="history-list" id="history-list">
            <p class="history-empty">Пока ничего не открыто</p>
        </div>
        <button class="history-clear" id="history-clear">Очистить</button>
    </div>

    <!-- МОДАЛКА АВТОРИЗАЦИИ -->
    <div class="auth-overlay hidden" id="auth-overlay">
        <div class="auth-modal">
            <h2 class="auth-logo">CASE SIMULATOR</h2>
            <div class="auth-tabs">
                <button class="auth-tab active" data-auth-tab="login">Вход</button>
                <button class="auth-tab" data-auth-tab="register">Регистрация</button>
            </div>
            <div class="auth-form" id="auth-login-form">
                <input type="text" id="login-login" class="auth-input" placeholder="Логин" autocomplete="username" maxlength="15">
                <input type="password" id="login-password" class="auth-input" placeholder="Пароль" autocomplete="current-password" maxlength="26">
                <label class="auth-checkbox-label">
                    <input type="checkbox" id="login-remember"> Запомнить меня
                </label>
                <button class="auth-submit" id="login-submit">Войти</button>
                <div class="auth-error" id="login-error"></div>
            </div>
            <div class="auth-form hidden" id="auth-register-form">
                <input type="text" id="reg-nick" class="auth-input" placeholder="Ник (1-16 символов)" maxlength="16">
                <input type="text" id="reg-login" class="auth-input" placeholder="Логин (3-15 символов)" autocomplete="username" maxlength="15">
                <input type="password" id="reg-password" class="auth-input" placeholder="Пароль (4-26 символов)" autocomplete="new-password" maxlength="26">
                <button class="auth-submit" id="reg-submit">Зарегистрироваться</button>
                <div class="auth-error" id="reg-error"></div>
            </div>
        </div>
    </div>

    <!-- КНОПКА БУРГЕРА -->
    <div class="burger-menu hidden" id="burger-menu">
        <button class="burger-btn" id="burger-btn">&#9776;</button>
    </div>

    <!-- ПАНЕЛЬ СТАТИСТИКИ -->
    <div class="stats-overlay" id="stats-overlay"></div>
    <div class="stats-panel" id="stats-panel">
        <div class="stats-header">
            <h2 class="stats-title" id="stats-title">Профиль</h2>
            <button class="stats-close" id="stats-close">&times;</button>
        </div>
        <div class="panel-tabs">
            <button class="panel-tab active" data-panel-tab="stats">📊 Статистика</button>
            <button class="panel-tab" data-panel-tab="inventory">🎒 Инвентарь</button>
        </div>
        <div class="stats-nick" id="stats-nick"></div>
        <div class="stats-content" id="stats-content"></div>
        <button class="stats-logout" id="stats-logout">Выйти с аккаунта</button>
    </div>

    <canvas id="particles-canvas"></canvas>

    <a href="https://t.me/help_777_228_bot" target="_blank" class="support-btn">💬 Поддержка</a>

    <!-- МОДАЛКА ПОПОЛНЕНИЯ -->
    <div class="topup-overlay hidden" id="topup-overlay">
        <div class="topup-modal">
            <h2 class="topup-title">Пополнение баланса</h2>
            <input type="text" id="topup-key" class="topup-input" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" autocomplete="off">
            <button class="topup-submit" id="topup-submit">Активировать</button>
            <div class="topup-error" id="topup-error"></div>
            <button class="topup-close" id="topup-close">Закрыть</button>
        </div>
    </div>

    <!-- ЭКРАН АДМИНКИ -->
    <div id="admin-overlay" class="auth-overlay hidden">
        <div class="auth-modal">
            <h2 class="auth-logo">🔑 ADMIN</h2>
            <p class="admin-subtitle">Доступ только для администратора</p>
            <form id="admin-login-form">
                <input type="password" id="admin-pass" class="auth-input" placeholder="Пароль администратора" maxlength="30" autocomplete="current-password">
                <button type="submit" class="auth-submit">Войти</button>
                <div class="auth-error" id="admin-error"></div>
            </form>
        </div>
    </div>
    <div id="admin-screen" style="display:none; padding:40px 20px; max-width:700px; margin:0 auto; position:relative; z-index:1;">
        <h1 style="font-family:Orbitron; color:#e4ae39; margin-bottom:30px; font-size:24px;">🔑 Админка — Промо-ключи</h1>
        <div id="admin-panel">
            <div style="background:var(--bg-secondary); border-radius:12px; padding:20px; margin-bottom:20px;">
                <h3 style="margin-bottom:15px; font-size:16px;">Генерация ключей</h3>
                <form id="admin-gen-form" style="display:flex; gap:10px; flex-wrap:wrap; align-items:end;">
                    <div style="flex:1; min-width:120px;">
                        <label style="color:#8a8a9a; font-size:12px;">Сумма</label>
                        <input type="number" id="admin-amount" class="auth-input" placeholder="Сумма" min="1" style="width:100%;">
                    </div>
                    <div style="width:80px;">
                        <label style="color:#8a8a9a; font-size:12px;">Кол-во</label>
                        <input type="number" id="admin-count" class="auth-input" value="1" min="1" max="50" style="width:100%;">
                    </div>
                    <button type="submit" class="auth-submit" style="width:auto; padding:10px 20px;">Генерировать</button>
                </form>
            </div>
            <div style="background:var(--bg-secondary); border-radius:12px; padding:20px;">
                <h3 style="margin-bottom:15px; font-size:16px;">Сгенерированные ключи</h3>
                <div id="admin-keys-list"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="js/app.js?v=17"></script>
</body>
</html>
